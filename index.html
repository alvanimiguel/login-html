<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;700;900&display=swap"
        rel="stylesheet">

    <title>Tela de Login</title>
</head>

<body>
    <div class="container">
        <form>
            <h1>Login</h1>

            <div class="input-container">
                <input placeholder="Email" type="email" required>
                <img width="25" height="25" src="./assets/user.svg" alt="user" />
            </div>

            <div class="input-container">
                <input placeholder="Senha" type="password" required>
                <img width="25" height="25" src="./assets/lock.svg" alt="lock" />
                <a href="404.html">Esqueci minha senha</a>
            </div>

            <button id="btnEntrar" type="button" class="submit-button">Entrar</button>

            <div class="register-link">
                <p>Não está casdastrado? <a href="404.html">Cadastrar</a></p>
            </div>
        </form>
    </div>

    <footer>
        <p>© 2026 Alvani Miguel</p>
        <p>Site feito por Alvani Miguel Santos de Sousa Neto</p>
        <p><a href="https://github.com/alvanimiguel">github.com/alvanimiguel</a></p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
